<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Chapter 14 - Spinning Top</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="page">
      <div class="top-strip"></div>

      <div class="chapter-title">CHAPTER 14 - SPINNING TOP</div>

      <div class="hero-image">
        <img src="./picture1.png" alt="" style="width: 100%; height: 100%" />
        <img src="./picture2.png" alt="" style="width: 100%; height: 100%" />
      </div>

      <div class="footer-strip"></div>
    </div>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        background: #efefef;
        font-family: Arial, sans-serif;
        padding: 20px;
      }

      .page {
        width: 70%;
        margin: auto;
        background: #fff;
        padding: 30px;
      }

      .top-strip {
        height: 20px;
        background: linear-gradient(to right, #d5f5d3, #e6ff54, #dce59b);
        margin-bottom: 20px;
      }

      .chapter-title {
        font-size: 32px;
        font-weight: bold;
        margin-bottom: 30px;
        font-family: "Comic Sans MS", cursive;
        border-bottom: 4px solid #69b6ff;
        display: inline-block;
        padding-bottom: 8px;
      }

      .hero-image {
        text-align: center;
        margin-bottom: 30px;
      }

      .hero-image img {
        max-width: 100%;
      }

      .step-label {
        display: inline-block;
        padding: 10px 30px;
        border: 3px solid #6db8ff;
        border-radius: 25px;
        font-size: 30px;
        margin-bottom: 20px;
        font-family: "Comic Sans MS", cursive;
      }

      .assembly-image {
        text-align: center;
        margin: 20px 0;
      }

      .assembly-image img {
        max-width: 100%;
      }

      .parts-row {
        display: flex;
        gap: 40px;
        margin-top: 20px;
      }

      .part-box {
        border: 2px solid #f2d26a;
        text-align: center;
        padding: 10px;
        min-width: 120px;
      }

      .part-box img {
        width: 70px;
        display: block;
        margin: auto;
      }

      .part-box span {
        display: block;
        font-size: 20px;
        margin-top: 5px;
      }

      .part-box strong {
        display: block;
        margin-top: 5px;
      }

      .divider {
        border-top: 1px solid #bbb;
        margin: 40px 0;
      }

      .footer-strip {
        margin-top: 40px;
        height: 60px;
        background: linear-gradient(to right, #d5f5d3, #e6ff54, #dce59b);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 24px;
      }
    </style>
  </body>
</html>
